name: Update Homebrew tap

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-homebrew-tap:
    if: github.repository == 'avyayv/home-cli'
    runs-on: ubuntu-latest
    steps:
      - name: Compute source archive metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          sha="${GITHUB_SHA}"
          short="${sha:0:12}"
          version="$(date -u +%Y.%m.%d).${short}"
          archive_url="https://github.com/${GITHUB_REPOSITORY}/archive/${sha}.tar.gz"
          curl -fsSL "$archive_url" -o source.tar.gz
          sha256="$(sha256sum source.tar.gz | awk '{print $1}')"
          {
            echo "sha=$sha"
            echo "short=$short"
            echo "version=$version"
            echo "sha256=$sha256"
            echo "archive_url=$archive_url"
          } >> "$GITHUB_OUTPUT"

      - name: Check out Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: avyayv/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update gree and oura formulae
        working-directory: homebrew-tap
        env:
          ARCHIVE_URL: ${{ steps.meta.outputs.archive_url }}
          VERSION: ${{ steps.meta.outputs.version }}
          SHA256: ${{ steps.meta.outputs.sha256 }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          formulae = {
              "Formula/gree.rb": "https://github.com/avyayv/home-cli/tree/main/cli/gree-cli",
              "Formula/oura.rb": "https://github.com/avyayv/home-cli/tree/main/cli/oura-ring-cli",
          }
          archive_url = os.environ["ARCHIVE_URL"]
          version = os.environ["VERSION"]
          sha256 = os.environ["SHA256"]

          for formula, homepage in formulae.items():
              path = Path(formula)
              text = path.read_text()
              text = re.sub(r'homepage ".*"', f'homepage "{homepage}"', text)
              text = re.sub(r'url ".*"', f'url "{archive_url}"', text)
              text = re.sub(r'version ".*"', f'version "{version}"', text)
              text = re.sub(r'sha256 ".*"', f'sha256 "{sha256}"', text)
              text = re.sub(r'head ".*", branch: "main"', 'head "https://github.com/avyayv/home-cli.git", branch: "main"', text)
              path.write_text(text)
          PY

      - name: Commit and push tap update
        working-directory: homebrew-tap
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/gree.rb Formula/oura.rb
          if git diff --cached --quiet; then
            echo "Homebrew tap is already current."
            exit 0
          fi
          git commit -m "Update home-cli formulae to ${{ steps.meta.outputs.short }}"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep $((attempt * 5))
          done
          exit 1
